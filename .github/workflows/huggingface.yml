name: Sync to Hugging Face Hub

on:
  push:
    branches: [main] # or master
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true # if you have large files
      - name: Push to Hub
        env:
          HF_TOKEN: ${{ secrets.VINAY_KUMAR29005 }}
        run: git push https://vinnu2005:$HF_TOKEN@huggingface.co/spaces/vinnu2005/Vinay_Kumar29005 main -f
